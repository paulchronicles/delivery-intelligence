team: SCRUM
project_key: SCRUM
qa_lead: paul@nomo.com
slack_channel: "#qa-payments"
target_transition_state: "Ready for Review"

definition_of_done:
  acceptance_criteria_minimum: 3
  designs_required: true
  non_functional_required: true

compliance_triggers:
  - keyword: "card"
    requirement: "Must include PCI DSS tokenisation AC — never store raw card numbers"
    severity: BLOCKER
  - keyword: "payment"
    requirement: "Must include PCI DSS scope confirmation and audit logging AC"
    severity: CRITICAL
  - keyword: "personal data"
    requirement: "Must include GDPR lawful basis and retention period"
    severity: BLOCKER
  - keyword: "password"
    requirement: "Must include secure storage AC (bcrypt/scrypt/argon2)"
    severity: CRITICAL
  - keyword: "bank account"
    requirement: "Must include encryption and audit logging AC"
    severity: BLOCKER

journeys:
  - name: "Guest checkout"
    keywords: [checkout, basket, order, payment, purchase, buy]
    risk: critical
    description: "End-to-end purchase flow for unauthenticated users"

  - name: "Saved card checkout"
    keywords: [saved card, card storage, stored card, card details, tokenisation]
    risk: critical
    description: "Checkout using a previously saved payment method"

  - name: "Payment failure recovery"
    keywords: [payment retry, retry, payment failure, declined, failed payment]
    risk: critical
    description: "Recovery flow when a payment fails or is declined"

  - name: "Duplicate payment prevention"
    keywords: [duplicate, double charge, idempotency, retry, resubmit]
    risk: critical
    description: "Prevention of duplicate charges on retry or resubmit"

  - name: "User authentication"
    keywords: [login, logout, session, auth, password, credentials, 2fa, mfa]
    risk: high
    description: "Login, logout, session management and MFA flows"

  - name: "User onboarding"
    keywords: [registration, signup, sign up, kyc, identity, onboard, account creation]
    risk: high
    description: "New user registration and KYC verification"

  - name: "Account management"
    keywords: [profile, account, settings, preferences, personal details, address]
    risk: medium
    description: "User profile and account settings management"

  - name: "Refunds and disputes"
    keywords: [refund, dispute, chargeback, reversal, cancel, cancellation]
    risk: critical
    description: "Refund processing and dispute handling flows"

  - name: "Notifications"
    keywords: [email, sms, push notification, notification, alert, reminder]
    risk: low
    description: "Email, SMS and push notification delivery"

  - name: "Reporting and analytics"
    keywords: [report, analytics, dashboard, export, statement, transaction history]
    risk: medium
    description: "Reporting, statements and transaction history views"

severity_overrides: {}

test_repo:
  github_owner: paulchronicles
  github_repo: ever-ai
  branch: main
  spec_patterns:
    - "**/*.spec.ts"
    - "**/*.test.ts"
    - "**/*.feature"

components:
  - name: authentication
    keywords: [login, logout, session, password, locked out, token, mfa, 2fa, credentials, sign in]
    owner: platform-team
    risk: critical

  - name: payment-processing
    keywords: [payment, charge, transaction, billing, retry, duplicate charge, double payment, idempotency]
    owner: payments-team
    risk: critical

  - name: card-storage
    keywords: [saved card, stored card, card details, tokenisation, card vault, saved payment]
    owner: payments-team
    risk: critical

  - name: checkout
    keywords: [checkout, basket, order, purchase, buy, cart]
    owner: frontend-team
    risk: high

  - name: notifications
    keywords: [email, sms, push, notification, alert, not received, delivery failed]
    owner: comms-team
    risk: medium

  - name: user-profile
    keywords: [profile, account, settings, preferences, personal details, address]
    owner: frontend-team
    risk: low

severity_rules:
  p1:
    - payment processing broken or producing incorrect charges
    - authentication completely broken
    - data loss or corruption
    - security vulnerability exposed
    - production system down
    - personal data exposed
  p2:
    - major feature broken for all users
    - performance severely degraded
    - data displaying incorrectly
    - critical user journey cannot be completed
  p3:
    - feature partially broken with workaround
    - affects subset of users
    - non-critical functionality impaired
  p4:
    - cosmetic or minor UX issue
    - no functional impact
    - low traffic feature
